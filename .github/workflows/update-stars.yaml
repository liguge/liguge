name: Update Stars Badge

on: 
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      
      - name: Get Total Stars
        run: |
          python3 << 'EOF'
          import requests
          import json
          import os
          from datetime import datetime
          
          username = "liguge"
          # 从环境变量读取 token（安全！）
          token = os.getenv("STAR_TOKEN")
          url = f"https://api.github.com/users/{username}/repos"
          headers = {"Authorization": f"Bearer {token}"}
          params = {"per_page": 100, "page": 1}
          
          total_stars = 0
          total_repos = 0
          
          while True:
              response = requests.get(url, headers=headers, params=params)
              repos = response.json()
              if not isinstance(repos, list):
                 print(repos)
                 raise RuntimeError(f"GitHub API error: {repos}")
              if not repos:
                 break
              for repo in repos:
                 total_stars += repo.get("stargazers_count", 0)
              params["page"] += 1
          
          # 生成简洁的 JSON
          data = {
              "username": username,
              "total_stars": total_stars,
              "updated_at": datetime.now().isoformat()
          }
          
          with open("stars_data.json", "w", encoding="utf-8") as f:
              json.dump(data, f, indent=2, ensure_ascii=False)
          
          # 生成徽章数据
          badge_data = {
              "schemaVersion": 1,
              "label": "Total Stars",
              "message": str(total_stars),
              "color": "blue",
              "logo": "github"
          }
          
          with open("badge.json", "w", encoding="utf-8") as f:
              json.dump(badge_data, f, indent=2)
          
          print(f"✓ Total Stars: {total_stars}")
          print(f"✓ Total Repos: {total_repos}")
          EOF
        
        env:
          STAR_TOKEN: ${{ secrets.STAR_TOKEN}}  # ← 安全！自动提供
      
      - name: Commit and Push to update-stars
        run: |
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git checkout -C update-stars
            git add stars_data.json badge.json
            git commit -m "chore: update stars" || echo "nothing to commit"
            git push -f origin update-stars
